                                        disabled={!activePage}
                                        aria-label="Rotate left 90°"
                                        title="Rotate left"
                                    >
                                        <RotateCcw className="w-3.5 h-3.5" aria-hidden="true" />
                                    </Button>
                                    <Button 
                                        variant="ghost" 
                                        size="icon" 
                                        className="h-7 w-7" 
                                        onClick={rotateActivePageRight}
                                        disabled={!activePage}
                                        aria-label="Rotate right 90°"
                                        title="Rotate right"
                                    >
                                        <RotateCw className="w-3.5 h-3.5" aria-hidden="true" />
                                    </Button>
                                    <div className="flex-1" />
                                    <Button 
                                        variant="ghost" 
                                        size="icon" 
                                        className="h-7 w-7" 
                                        onClick={() => fileInputRef.current.click()}
                                        aria-label="Add pages"
                                        title="Add pages"
                                    >
                                        <Plus className="w-3.5 h-3.5" aria-hidden="true" />
                                    </Button>
                                    <Button 
                                        variant="ghost" 
                                        size="icon" 
                                        className="h-7 w-7 text-muted-foreground hover:text-destructive hover:bg-destructive/10" 
                                        onClick={deleteAllPages}
                                        disabled={pages.length === 0}
                                        aria-label="Delete all pages"
                                        title="Delete all"
                                    >
                                        <Trash2 className="w-3.5 h-3.5" aria-hidden="true" />
                                    </Button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4" role="list">
                                {pages.map((page, idx) => (
                                    <div 
                                        key={page.id} 
                                        onClick={() => { setActivePageId(page.id); setCropMode(false); setCropPoints(null); setPaintHistory([]); }}
                                        onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { setActivePageId(page.id); setCropMode(false); setCropPoints(null); }}}
                                        tabIndex={0}
                                        role="listitem"
                                        aria-selected={activePageId === page.id}
                                        aria-label={`Page ${idx + 1}: ${page.name}`}
                                        className={cn("group relative aspect-[3/4] border-2 rounded-lg overflow-hidden cursor-pointer transition-all hover:border-primary/50 focus:outline-none focus:ring-2 focus:ring-ring", activePageId === page.id ? "border-primary ring-2 ring-primary/10" : "border-border bg-white")}
                                    >
                                        <img src={page.src} className="w-full h-full object-cover" alt={`Page ${idx + 1}`} />
                                        <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Button 
                                                variant="destructive" 
                                                size="icon" 
                                                className="h-6 w-6" 
                                                onClick={(e) => { e.stopPropagation(); deletePage(page.id, page.name); }}
                                                aria-label={`Delete page ${idx + 1}`}
                                            >
                                                <Trash2 className="w-3 h-3" aria-hidden="true" />
                                            </Button>
                                        </div>
                                        <div className="absolute bottom-0 inset-x-0 bg-background/90 border-t p-1 text-center text-[10px] font-medium text-muted-foreground truncate px-2">{idx + 1}. {page.name}</div>
                                    </div>
                                ))}
                                {pages.length === 0 && (
                                    <div className="text-center p-8 border-2 border-dashed rounded-lg border-muted-foreground/25">
                                        <p className="text-sm text-muted-foreground">No pages</p>
                                    </div>
                                )}
                            </div>
                        </aside>

                        <main ref={containerRef} id="main-content" className="flex-1 bg-muted/10 bg-dot-pattern overflow-hidden relative" role="main">
                            <div ref={scrollContainerRef} className="scroll-container">
                                <div 
                                    className="scroll-content"
                                    style={{
                                        width: activePage ? Math.max('100%', displayWidth + 64) : '100%',
                                        height: activePage ? Math.max('100%', displayHeight + 64) : '100%',
                                        minWidth: activePage && displayWidth > (containerRef.current?.clientWidth || 0) - 64 ? displayWidth + 64 : '100%',
                                        minHeight: activePage && displayHeight > (containerRef.current?.clientHeight || 0) - 64 ? displayHeight + 64 : '100%',
                                    }}
                                >
                                    {activePage ? (
                                        <div ref={viewerRef}
                                             className="relative shadow-xl bg-white flex-shrink-0" 
                                             style={{ width: displayWidth, height: displayHeight }}
                                             onMouseDown={handlePaintMouseDown} 
                                             onMouseMove={(e) => { handleViewerMouseMove(e); handlePaintMouseMove(e); }} 
                                             onMouseUp={handleViewerMouseUp} 
                                             onMouseLeave={(e) => { handleViewerMouseUp(); handleViewerMouseLeave(); }}
                                             onMouseEnter={handleViewerMouseEnter}
                                        >
                                            
                                            <canvas 
                                                ref={canvasRef} 
                                                className={cn("w-full h-full block", cropMode ? "cursor-default" : activeTool === 'paint' ? "cursor-none" : "cursor-default")} 
                                                aria-label="Document canvas"
                                            />
                                            
                                            {activeTool === 'paint' && !cropMode && brushCursor.visible && (
                                                <div 
                                                    className="pointer-events-none absolute rounded-full border-2 transition-[width,height] duration-75"
                                                    style={{
                                                        width: brushSize * (zoom / 100),
                                                        height: brushSize * (zoom / 100),
                                                        left: brushCursor.x,
                                                        top: brushCursor.y,
                                                        transform: 'translate(-50%, -50%)',
                                                        borderColor: brushColor === '#ffffff' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.7)',
                                                        backgroundColor: brushColor === '#ffffff' 
                                                            ? 'rgba(255,255,255,0.3)' 
                                                            : `${brushColor}33`,
                                                        boxShadow: brushColor === '#ffffff' 
                                                            ? '0 0 0 1px rgba(0,0,0,0.2)' 
                                                            : '0 0 0 1px rgba(255,255,255,0.3)',
                                                    }}
                                                    aria-hidden="true"
                                                />
                                            )}
                                            
                                            {isProcessing && (
                                                <div className="absolute inset-0 bg-white/50 backdrop-blur-[2px] flex items-center justify-center z-30" role="alert" aria-busy="true">
                                                    <div className="bg-white px-6 py-3 rounded-full shadow-lg border flex items-center gap-3">
                                                        <Loader2 className="w-4 h-4 animate-spin" aria-hidden="true" />
                                                        <span className="text-sm font-medium">{processingMessage}</span>
                                                    </div>
                                                </div>
                                            )}

                                            {renderCropOverlay()}
                                        </div>
                                    ) : (
                                        <div className="text-center">
                                            <div className="w-16 h-16 bg-muted rounded-2xl flex items-center justify-center mx-auto mb-4">
                                                <ImageIcon className="w-8 h-8 text-muted-foreground" aria-hidden="true" />
                                            </div>
                                            <h3 className="text-lg font-semibold">No Document Selected</h3>
                                            <p className="text-sm text-muted-foreground mt-1 max-w-xs mx-auto">Upload a PDF or Image to start editing, enhancing, and exporting.</p>
                                            <Button className="mt-4" onClick={() => fileInputRef.current.click()}>Upload File</Button>
                                            <p className="text-xs text-muted-foreground mt-2">Max 50MB per file • PDF limit: 100 pages</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </main>

                        <aside className={cn("bg-background border-l flex flex-col transition-all duration-300", rightPanelOpen ? "w-80" : "w-14")} role="complementary" aria-label="Tools panel">
                            <div className="h-12 border-b flex items-center px-2 justify-between">
                                {rightPanelOpen && <span className="font-semibold text-sm px-2">Tools</span>}
                                <Button variant="ghost" size="icon" onClick={() => setRightPanelOpen(!rightPanelOpen)} aria-label={rightPanelOpen ? "Collapse tools panel" : "Expand tools panel"}>
                                    {rightPanelOpen ? <ChevronRight className="w-4 h-4" aria-hidden="true" /> : <ChevronLeft className="w-4 h-4" aria-hidden="true" />}
                                </Button>
                            </div>

                            <div className="flex-1 overflow-y-auto">
                                <div className={cn("grid gap-1 p-2", rightPanelOpen ? "grid-cols-4" : "grid-cols-1")} role="tablist">
                                    {['enhance', 'edit', 'paint', 'export'].map(t => (
                                        <button 
                                            key={t} 
                                            onClick={() => { setActiveTool(t); if (t !== 'edit') { setCropMode(false); setCropPoints(null); } if (!rightPanelOpen) setRightPanelOpen(true); }}
                                            role="tab"
                                            aria-selected={activeTool === t}
                                            aria-controls={`${t}-panel`}
                                            className={cn("flex flex-col items-center justify-center gap-1 rounded-md py-2 px-1 text-[10px] font-medium transition-colors uppercase focus:outline-none focus:ring-2 focus:ring-ring", 
                                            activeTool === t ? "bg-secondary text-secondary-foreground" : "text-muted-foreground hover:bg-muted hover:text-foreground")}
                                        >
                                            {t === 'enhance' && <Sparkles className="w-4 h-4" aria-hidden="true" />}
                                            {t === 'edit' && <Crop className="w-4 h-4" aria-hidden="true" />}
                                            {t === 'paint' && <Paintbrush className="w-4 h-4" aria-hidden="true" />}
                                            {t === 'export' && <Download className="w-4 h-4" aria-hidden="true" />}
                                            {rightPanelOpen && <span>{t}</span>}
                                        </button>
                                    ))}
                                </div>
                                <Separator />
                                
                                {rightPanelOpen && activePage && (
                                    <div className="p-4 space-y-6">
                                        
                                        {activeTool === 'enhance' && (
                                            <div id="enhance-panel" role="tabpanel" className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Document Enhancement</h3>
                                                    <p className="text-xs text-muted-foreground">Transform photos into clean scanned documents.</p>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2" role="radiogroup" aria-label="Enhancement mode">
                                                    {[
                                                        { id: 'auto', label: 'Auto', desc: 'Balanced' },
                                                        { id: 'scan', label: 'Scan', desc: 'Clean B&W' },
                                                        { id: 'lighten', label: 'Lighten', desc: 'Remove shadows' },
                                                        { id: 'sharpen', label: 'Sharpen', desc: 'Increase clarity' }
                                                    ].map(mode => (
                                                        <button 
                                                            key={mode.id} 
                                                            onClick={() => setEnhanceMode(mode.id)}
                                                            role="radio"
                                                            aria-checked={enhanceMode === mode.id}
                                                            className={cn("p-2 rounded-md border text-left transition-all focus:outline-none focus:ring-2 focus:ring-ring", 
                                                            enhanceMode === mode.id ? "border-primary bg-primary/5" : "border-border hover:border-primary/50")}
                                                        >
                                                            <div className="text-xs font-medium">{mode.label}</div>
                                                            <div className="text-[10px] text-muted-foreground">{mode.desc}</div>
                                                        </button>
                                                    ))}
                                                </div>
                                                
                                                <div className="space-y-2 p-3 bg-muted/30 rounded-lg border">
                                                    <div className="flex items-center justify-between">
                                                        <label htmlFor="intensity-slider" className="text-xs font-medium">Intensity</label>
                                                        <span className="text-xs font-semibold tabular-nums bg-background px-2 py-0.5 rounded border">{enhanceIntensity}%</span>
                                                    </div>
                                                    <input 
                                                        id="intensity-slider"
                                                        type="range" 
                                                        min="0" 
                                                        max="100" 
                                                        value={enhanceIntensity} 
                                                        onChange={(e) => setEnhanceIntensity(parseInt(e.target.value))} 
                                                        className="intensity-slider w-full"
                                                        aria-valuemin={0}
                                                        aria-valuemax={100}
                                                        aria-valuenow={enhanceIntensity}
                                                    />
                                                    <div className="flex justify-between text-[10px] text-muted-foreground">
                                                        <span>Subtle</span>
                                                        <span>Full</span>
                                                    </div>
                                                </div>
                                                
                                                <Button className="w-full" onClick={applyFilter} disabled={isProcessing}>
                                                    <Wand2 className="w-4 h-4 mr-2" aria-hidden="true" /> Apply to This Page
                                                </Button>
                                                
                                                {pages.length > 1 && (
                                                    <Button variant="outline" className="w-full" onClick={applyFilterToAll} disabled={isProcessing}>
                                                        <Sparkles className="w-4 h-4 mr-2" aria-hidden="true" /> Apply to All Pages
                                                    </Button>
                                                )}
                                                
                                                <Button variant="outline" className="w-full" onClick={resetImage}>
                                                    <RefreshCw className="w-4 h-4 mr-2" aria-hidden="true" /> Reset to Original
                                                </Button>
                                            </div>
                                        )}

                                        {activeTool === 'edit' && (
                                            <div id="edit-panel" role="tabpanel" className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Perspective Crop</h3>
                                                    <p className="text-xs text-muted-foreground">Drag the 4 corners to select your document. Corrects perspective automatically.</p>
                                                </div>
                                                {!cropMode ? (
                                                    <Button className="w-full" onClick={() => setCropMode(true)}>
                                                        <Crop className="w-4 h-4 mr-2" aria-hidden="true" /> Start Crop
                                                    </Button>
                                                ) : (
                                                    <div className="space-y-2">
                                                        <div className="bg-muted/50 p-3 rounded-md border text-xs text-center text-muted-foreground">
                                                            Drag corners or use arrow keys when focused
                                                        </div>
                                                        <Button 
                                                            className="w-full" 
                                                            onClick={executePerspectiveCrop}
                                                            disabled={isProcessing || !isValidPolygon(cropPoints)}
                                                        >
                                                            <Check className="w-4 h-4 mr-2" aria-hidden="true" /> Apply Crop
                                                        </Button>
                                                        <Button variant="ghost" className="w-full text-destructive hover:text-destructive" onClick={() => { setCropMode(false); setCropPoints(null); }}>Cancel (Esc)</Button>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {activeTool === 'paint' && (
                                            <div id="paint-panel" role="tabpanel" className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Correction Tool</h3>
                                                    <p className="text-xs text-muted-foreground">Use white to erase marks, black to fill text. Ctrl+Z to undo.</p>
                                                </div>
                                                
                                                <div>
                                                    <label className="text-xs font-medium mb-2 block">Shade</label>
                                                    <div className="grid grid-cols-6 gap-1.5" role="radiogroup" aria-label="Brush color">
                                                        {paintColors.map(c => (
                                                            <button 
                                                                key={c} 
                                                                onClick={() => setBrushColor(c)} 
                                                                role="radio"
                                                                aria-checked={brushColor === c}
                                                                aria-label={c === '#ffffff' ? 'White' : c === '#000000' ? 'Black' : `Gray ${c}`}
                                                                className={cn("w-8 h-8 rounded border transition-all focus:outline-none focus:ring-2 focus:ring-ring", brushColor === c ? "ring-2 ring-primary ring-offset-1 scale-110" : "border-border hover:scale-105")} 
                                                                style={{ backgroundColor: c }} 
                                                            />
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <label htmlFor="brush-size" className="text-xs font-medium mb-2 block">Brush Size: {brushSize}px</label>
                                                    <input 
                                                        id="brush-size"
                                                        type="range" 
                                                        min="1" 
                                                        max="50" 
                                                        value={brushSize} 
                                                        onChange={(e) => setBrushSize(parseInt(e.target.value))} 
                                                        className="w-full accent-primary"
                                                        aria-valuemin={1}
                                                        aria-valuemax={50}
                                                        aria-valuenow={brushSize}
                                                    />
                                                </div>
                                                
                                                <Separator />
                                                
                                                <div className="space-y-2">
                                                    <Button 
                                                        variant="outline" 
                                                        className="w-full" 
                                                        onClick={undoLastStroke}
                                                        disabled={paintHistory.length === 0}
                                                    >
                                                        <Undo2 className="w-4 h-4 mr-2" aria-hidden="true" /> 
                                                        Undo Stroke
                                                        {paintHistory.length > 0 && (
                                                            <span className="ml-auto text-xs text-muted-foreground">({paintHistory.length}/{MAX_UNDO_STATES})</span>
                                                        )}
                                                    </Button>
                                                    <Button 
                                                        variant="ghost" 
                                                        className="w-full text-destructive hover:text-destructive hover:bg-destructive/10" 
                                                        onClick={clearAllPaint}
                                                    >
                                                        <Eraser className="w-4 h-4 mr-2" aria-hidden="true" /> Clear All Paint
                                                    </Button>
                                                </div>
                                            </div>
                                        )}

                                        {activeTool === 'export' && (
                                            <div id="export-panel" role="tabpanel" className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Export Current Page</h3>
                                                    <p className="text-xs text-muted-foreground">Save current page to device.</p>
                                                </div>
                                                <div className="grid grid-cols-3 gap-3">
                                                    <button 
                                                        onClick={() => exportFile('pdf')} 
                                                        className="flex flex-col items-center justify-center p-4 rounded-lg border bg-card hover:bg-accent hover:text-accent-foreground transition-colors text-center gap-2 focus:outline-none focus:ring-2 focus:ring-ring"
                                                        aria-label="Export as PDF"
                                                    >
                                                        <FileText className="w-6 h-6 text-red-500" aria-hidden="true" />
                                                        <span className="text-xs font-medium">PDF</span>
                                                    </button>
                                                    <button 
                                                        onClick={() => exportFile('png')} 
                                                        className="flex flex-col items-center justify-center p-4 rounded-lg border bg-card hover:bg-accent hover:text-accent-foreground transition-colors text-center gap-2 focus:outline-none focus:ring-2 focus:ring-ring"
                                                        aria-label="Export as PNG"
                                                    >
                                                        <ImageIcon className="w-6 h-6 text-green-500" aria-hidden="true" />
                                                        <span className="text-xs font-medium">PNG</span>
                                                    </button>
                                                    <button 
                                                        onClick={() => exportFile('jpg')} 
                                                        className="flex flex-col items-center justify-center p-4 rounded-lg border bg-card hover:bg-accent hover:text-accent-foreground transition-colors text-center gap-2 focus:outline-none focus:ring-2 focus:ring-ring"
                                                        aria-label="Export as JPG"
                                                    >
                                                        <ImageIcon className="w-6 h-6 text-blue-500" aria-hidden="true" />
                                                        <span className="text-xs font-medium">JPG</span>
                                                    </button>
                                                </div>
                                                <p className="text-[10px] text-muted-foreground text-center">PNG for best quality, JPG for smaller size</p>
                                                
                                                {pages.length > 1 && (
                                                    <>
                                                        <Separator />
                                                        <div>
                                                            <h3 className="font-medium text-sm mb-1">Export All Pages</h3>
                                                            <p className="text-xs text-muted-foreground mb-3">Combine all pages into a single PDF.</p>
                                                            <Button className="w-full" onClick={exportAllAsPdf} disabled={isProcessing}>
                                                                <FileText className="w-4 h-4 mr-2" aria-hidden="true" /> Export All as PDF ({pages.length} pages)
                                                            </Button>
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                {rightPanelOpen && !activePage && (
                                    <div className="p-8 text-center text-xs text-muted-foreground">Select a page to view tools.</div>
                                )}
                            </div>
                        </aside>
                    </div>
                    
                    <input 
                        type="file" 
                        ref={fileInputRef} 
                        onChange={handleFileUpload} 
                        className="hidden" 
                        multiple 
                        accept="image/*,application/pdf"
                        aria-label="Upload files"
                    />
                    
                    <Dialog 
                        open={dialog.open}
                        onClose={() => setDialog(prev => ({ ...prev, open: false }))}
                        title={dialog.title}
                        description={dialog.description}
                        variant={dialog.variant}
                        onConfirm={dialog.onConfirm}
                        confirmText="Delete"
                        cancelText="Cancel"
                    />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DocuScanPro />);
    </script>
</body>
</html>
