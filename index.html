<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: {
                            DEFAULT: "hsl(var(--primary))",
                            foreground: "hsl(var(--primary-foreground))",
                        },
                        secondary: {
                            DEFAULT: "hsl(var(--secondary))",
                            foreground: "hsl(var(--secondary-foreground))",
                        },
                        destructive: {
                            DEFAULT: "hsl(var(--destructive))",
                            foreground: "hsl(var(--destructive-foreground))",
                        },
                        muted: {
                            DEFAULT: "hsl(var(--muted))",
                            foreground: "hsl(var(--muted-foreground))",
                        },
                        accent: {
                            DEFAULT: "hsl(var(--accent))",
                            foreground: "hsl(var(--accent-foreground))",
                        },
                    },
                    borderRadius: {
                        lg: "var(--radius)",
                        md: "calc(var(--radius) - 2px)",
                        sm: "calc(var(--radius) - 4px)",
                    },
                },
            },
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%;
            --foreground: 240 10% 3.9%;
            --card: 0 0% 100%;
            --card-foreground: 240 10% 3.9%;
            --popover: 0 0% 100%;
            --popover-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%;
            --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%;
            --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%;
            --muted-foreground: 240 3.8% 46.1%;
            --accent: 240 4.8% 95.9%;
            --accent-foreground: 240 5.9% 10%;
            --destructive: 0 84.2% 60.2%;
            --destructive-foreground: 0 0% 98%;
            --border: 240 5.9% 90%;
            --input: 240 5.9% 90%;
            --ring: 240 10% 3.9%;
            --radius: 0.5rem;
        }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .bg-dot-pattern {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .crop-handle {
            width: 14px;
            height: 14px;
            background: white;
            border: 2px solid hsl(240 5.9% 10%);
            border-radius: 50%;
            position: absolute;
            cursor: move;
            z-index: 100;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            transition: transform 0.1s ease, background 0.1s ease;
        }
        .crop-handle:hover {
            transform: translate(-50%, -50%) scale(1.2);
            background: hsl(240 5.9% 10%);
        }
        .crop-handle:active {
            transform: translate(-50%, -50%) scale(1.3);
        }
        /* Fix for proper scrolling when zoomed */
        .scroll-container {
            overflow: auto;
            width: 100%;
            height: 100%;
        }
        .scroll-content {
            min-width: 100%;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            box-sizing: border-box;
        }
    </style>
</head>
<body class="bg-background text-foreground antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { clsx } from 'https://esm.sh/clsx';
        import { twMerge } from 'https://esm.sh/tailwind-merge';
        import { 
          ZoomIn, ZoomOut, 
          Image as ImageIcon, Wand2, ScanLine, Download, Trash2, 
          ChevronRight, ChevronLeft, 
          FileText, Crop, RotateCw, Check,
          Paintbrush, Plus, RefreshCw, Sparkles, Undo2, Eraser
        } from 'https://esm.sh/lucide-react@0.294.0?deps=react@18.2.0';

        const cn = (...inputs) => twMerge(clsx(inputs));

        const Button = ({ children, variant = "default", size = "default", className, ...props }) => {
            const variants = {
                default: "bg-primary text-primary-foreground hover:bg-primary/90 shadow",
                destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90 shadow-sm",
                outline: "border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground",
                secondary: "bg-secondary text-secondary-foreground hover:bg-secondary/80",
                ghost: "hover:bg-accent hover:text-accent-foreground",
                link: "text-primary underline-offset-4 hover:underline",
            };
            const sizes = {
                default: "h-9 px-4 py-2",
                sm: "h-8 rounded-md px-3 text-xs",
                lg: "h-10 rounded-md px-8",
                icon: "h-9 w-9",
            };
            return (
                <button 
                    className={cn(
                        "inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50",
                        variants[variant], sizes[size], className
                    )}
                    {...props}
                >
                    {children}
                </button>
            );
        };

        const Separator = ({ className, orientation = "horizontal" }) => (
            <div className={cn("bg-border", orientation === "horizontal" ? "h-[1px] w-full" : "h-full w-[1px]", className)} />
        );

        // --- Advanced Document Enhancement ---
        const removeShadows = (imageData, width, height) => {
            const data = imageData.data;
            const blockSize = Math.max(32, Math.floor(Math.min(width, height) / 8));
            const background = new Float32Array(width * height);
            
            for (let by = 0; by < height; by += blockSize) {
                for (let bx = 0; bx < width; bx += blockSize) {
                    let maxBrightness = 0;
                    for (let y = by; y < Math.min(by + blockSize, height); y++) {
                        for (let x = bx; x < Math.min(bx + blockSize, width); x++) {
                            const idx = (y * width + x) * 4;
                            const brightness = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
                            maxBrightness = Math.max(maxBrightness, brightness);
                        }
                    }
                    for (let y = by; y < Math.min(by + blockSize, height); y++) {
                        for (let x = bx; x < Math.min(bx + blockSize, width); x++) {
                            background[y * width + x] = maxBrightness;
                        }
                    }
                }
            }
            
            for (let i = 0; i < width * height; i++) {
                const idx = i * 4;
                const bg = Math.max(background[i], 1);
                const factor = 255 / bg;
                data[idx] = Math.min(255, data[idx] * factor);
                data[idx + 1] = Math.min(255, data[idx + 1] * factor);
                data[idx + 2] = Math.min(255, data[idx + 2] * factor);
            }
        };

        const applyGaussianBlur = (imageData, width, height) => {
            const data = imageData.data;
            const output = new Uint8ClampedArray(data.length);
            const kernel = [1, 2, 1, 2, 4, 2, 1, 2, 1];
            const kernelSum = 16;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let r = 0, g = 0, b = 0, ki = 0;
                    for (let ky = -1; ky <= 1; ky++) {
                        for (let kx = -1; kx <= 1; kx++) {
                            const px = Math.min(width - 1, Math.max(0, x + kx));
                            const py = Math.min(height - 1, Math.max(0, y + ky));
                            const idx = (py * width + px) * 4;
                            const weight = kernel[ki++];
                            r += data[idx] * weight;
                            g += data[idx + 1] * weight;
                            b += data[idx + 2] * weight;
                        }
                    }
                    const outIdx = (y * width + x) * 4;
                    output[outIdx] = r / kernelSum;
                    output[outIdx + 1] = g / kernelSum;
                    output[outIdx + 2] = b / kernelSum;
                    output[outIdx + 3] = data[outIdx + 3];
                }
            }
            for (let i = 0; i < data.length; i++) data[i] = output[i];
        };

        const applySharpen = (imageData, width, height, amount = 0.5) => {
            const data = imageData.data;
            const original = new Uint8ClampedArray(data);
            applyGaussianBlur(imageData, width, height);
            for (let i = 0; i < data.length; i += 4) {
                for (let c = 0; c < 3; c++) {
                    const diff = original[i + c] - data[i + c];
                    data[i + c] = Math.min(255, Math.max(0, original[i + c] + diff * amount * 2));
                }
            }
        };

        const enhanceContrast = (imageData, width, height) => {
            const data = imageData.data;
            let minR = 255, maxR = 0, minG = 255, maxG = 0, minB = 255, maxB = 0;
            for (let i = 0; i < data.length; i += 4) {
                minR = Math.min(minR, data[i]); maxR = Math.max(maxR, data[i]);
                minG = Math.min(minG, data[i + 1]); maxG = Math.max(maxG, data[i + 1]);
                minB = Math.min(minB, data[i + 2]); maxB = Math.max(maxB, data[i + 2]);
            }
            const rangeR = maxR - minR || 1, rangeG = maxG - minG || 1, rangeB = maxB - minB || 1;
            for (let i = 0; i < data.length; i += 4) {
                data[i] = ((data[i] - minR) / rangeR) * 255;
                data[i + 1] = ((data[i + 1] - minG) / rangeG) * 255;
                data[i + 2] = ((data[i + 2] - minB) / rangeB) * 255;
            }
        };

        const applyAdaptiveThreshold = (imageData, width, height, sensitivity = 0.15) => {
            const data = imageData.data;
            const gray = new Float32Array(width * height);
            for (let i = 0; i < width * height; i++) {
                const idx = i * 4;
                gray[i] = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
            }
            
            const integral = new Float64Array(width * height);
            for (let y = 0; y < height; y++) {
                let rowSum = 0;
                for (let x = 0; x < width; x++) {
                    rowSum += gray[y * width + x];
                    integral[y * width + x] = y === 0 ? rowSum : integral[(y - 1) * width + x] + rowSum;
                }
            }
            
            const windowSize = Math.floor(Math.min(width, height) / 8);
            const s = Math.floor(windowSize / 2);
            const t = 1 - sensitivity;
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const x1 = Math.max(0, x - s), y1 = Math.max(0, y - s);
                    const x2 = Math.min(width - 1, x + s), y2 = Math.min(height - 1, y + s);
                    const count = (x2 - x1 + 1) * (y2 - y1 + 1);
                    
                    let sum = integral[y2 * width + x2];
                    if (x1 > 0) sum -= integral[y2 * width + (x1 - 1)];
                    if (y1 > 0) sum -= integral[(y1 - 1) * width + x2];
                    if (x1 > 0 && y1 > 0) sum += integral[(y1 - 1) * width + (x1 - 1)];
                    
                    const mean = sum / count;
                    const idx = (y * width + x) * 4;
                    const value = gray[y * width + x] > mean * t ? 255 : 0;
                    data[idx] = value; data[idx + 1] = value; data[idx + 2] = value;
                }
            }
        };

        const applyDocumentEnhancement = (ctx, width, height, mode = 'auto') => {
            const imageData = ctx.getImageData(0, 0, width, height);
            if (mode === 'auto' || mode === 'scan') {
                removeShadows(imageData, width, height);
                enhanceContrast(imageData, width, height);
                applySharpen(imageData, width, height, 0.6);
                applyAdaptiveThreshold(imageData, width, height, mode === 'scan' ? 0.12 : 0.18);
            } else if (mode === 'lighten') {
                removeShadows(imageData, width, height);
                enhanceContrast(imageData, width, height);
            } else if (mode === 'sharpen') {
                applySharpen(imageData, width, height, 1.0);
                enhanceContrast(imageData, width, height);
            }
            ctx.putImageData(imageData, 0, 0);
        };

        // --- Perspective Transform ---
        const solveLinearSystem = (A, b) => {
            const n = b.length;
            const augmented = A.map((row, i) => [...row, b[i]]);
            for (let col = 0; col < n; col++) {
                let maxRow = col;
                for (let row = col + 1; row < n; row++) {
                    if (Math.abs(augmented[row][col]) > Math.abs(augmented[maxRow][col])) maxRow = row;
                }
                [augmented[col], augmented[maxRow]] = [augmented[maxRow], augmented[col]];
                for (let row = col + 1; row < n; row++) {
                    const factor = augmented[row][col] / augmented[col][col];
                    for (let j = col; j <= n; j++) augmented[row][j] -= factor * augmented[col][j];
                }
            }
            const x = new Array(n).fill(0);
            for (let row = n - 1; row >= 0; row--) {
                x[row] = augmented[row][n];
                for (let col = row + 1; col < n; col++) x[row] -= augmented[row][col] * x[col];
                x[row] /= augmented[row][row];
            }
            return x;
        };

        const computePerspectiveTransform = (srcPoints, dstPoints) => {
            const [p0, p1, p2, p3] = srcPoints;
            const [d0, d1, d2, d3] = dstPoints;
            const A = [], b = [];
            const points = [[p0, d0], [p1, d1], [p2, d2], [p3, d3]];
            for (const [src, dst] of points) {
                A.push([src.x, src.y, 1, 0, 0, 0, -dst.x * src.x, -dst.x * src.y]);
                A.push([0, 0, 0, src.x, src.y, 1, -dst.y * src.x, -dst.y * src.y]);
                b.push(dst.x); b.push(dst.y);
            }
            return solveLinearSystem(A, b);
        };

        const applyPerspectiveTransform = (sourceCanvas, srcPoints, width, height) => {
            const destCanvas = document.createElement('canvas');
            destCanvas.width = width; destCanvas.height = height;
            const destCtx = destCanvas.getContext('2d');
            const dstPoints = [{ x: 0, y: 0 }, { x: width, y: 0 }, { x: width, y: height }, { x: 0, y: height }];
            const H = computePerspectiveTransform(dstPoints, srcPoints);
            const sourceCtx = sourceCanvas.getContext('2d');
            const sourceData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
            const destData = destCtx.createImageData(width, height);
            
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const denom = H[6] * x + H[7] * y + 1;
                    const srcX = (H[0] * x + H[1] * y + H[2]) / denom;
                    const srcY = (H[3] * x + H[4] * y + H[5]) / denom;
                    const x0 = Math.floor(srcX), y0 = Math.floor(srcY);
                    const x1 = x0 + 1, y1 = y0 + 1;
                    
                    if (x0 >= 0 && x1 < sourceCanvas.width && y0 >= 0 && y1 < sourceCanvas.height) {
                        const fx = srcX - x0, fy = srcY - y0;
                        for (let c = 0; c < 4; c++) {
                            const v00 = sourceData.data[(y0 * sourceCanvas.width + x0) * 4 + c];
                            const v10 = sourceData.data[(y0 * sourceCanvas.width + x1) * 4 + c];
                            const v01 = sourceData.data[(y1 * sourceCanvas.width + x0) * 4 + c];
                            const v11 = sourceData.data[(y1 * sourceCanvas.width + x1) * 4 + c];
                            destData.data[(y * width + x) * 4 + c] = v00 * (1 - fx) * (1 - fy) + v10 * fx * (1 - fy) + v01 * (1 - fx) * fy + v11 * fx * fy;
                        }
                    } else {
                        const idx = (y * width + x) * 4;
                        destData.data[idx] = 255; destData.data[idx + 1] = 255; destData.data[idx + 2] = 255; destData.data[idx + 3] = 255;
                    }
                }
            }
            destCtx.putImageData(destData, 0, 0);
            return destCanvas;
        };

        // --- Main App ---
        function DocuScanPro() {
            const [pages, setPages] = useState([]);
            const [activePageId, setActivePageId] = useState(null);
            const [zoom, setZoom] = useState(60);
            const [isProcessing, setIsProcessing] = useState(false);
            const [rightPanelOpen, setRightPanelOpen] = useState(true);
            const [activeTool, setActiveTool] = useState("enhance");
            const [enhanceMode, setEnhanceMode] = useState("auto");
            
            // Crop state - 4 corner points (relative to displayed canvas size)
            const [cropPoints, setCropPoints] = useState(null);
            const [isDraggingPoint, setIsDraggingPoint] = useState(null);
            const [cropMode, setCropMode] = useState(false);

            // Paint state - white/black only
            const [brushColor, setBrushColor] = useState("#000000");
            const [brushSize, setBrushSize] = useState(10);
            const [isPainting, setIsPainting] = useState(false);
            const [paintHistory, setPaintHistory] = useState([]);
            const [brushCursor, setBrushCursor] = useState({ x: 0, y: 0, visible: false });
            
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const viewerRef = useRef(null);
            const fileInputRef = useRef(null);
            const scrollContainerRef = useRef(null);

            const paintColors = [
                '#000000', '#1a1a1a', '#333333', '#4d4d4d', '#666666', '#808080',
                '#999999', '#b3b3b3', '#cccccc', '#e6e6e6', '#f2f2f2', '#ffffff',
            ];

            useEffect(() => {
                if (!window.pdfjsLib) {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                    script.async = true;
                    script.onload = () => {
                        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    };
                    document.body.appendChild(script);
                }
            }, []);

            const activePage = pages.find(p => p.id === activePageId);

            // Auto-fit zoom only when page changes
            useEffect(() => {
                if (activePage && containerRef.current) {
                    const container = containerRef.current;
                    const padding = 64;
                    const availW = container.clientWidth - padding;
                    const availH = container.clientHeight - padding;
                    if (availW > 0 && availH > 0) {
                        const scaleX = availW / activePage.width;
                        const scaleY = availH / activePage.height;
                        setZoom(Math.floor(Math.min(scaleX, scaleY) * 95));
                    }
                }
            }, [activePage?.id]);

            // Initialize crop points when entering crop mode (centered, within bounds)
            useEffect(() => {
                if (cropMode && activePage && viewerRef.current && !cropPoints) {
                    const rect = viewerRef.current.getBoundingClientRect();
                    const padding = Math.min(rect.width, rect.height) * 0.1;
                    setCropPoints([
                        { x: padding, y: padding },
                        { x: rect.width - padding, y: padding },
                        { x: rect.width - padding, y: rect.height - padding },
                        { x: padding, y: rect.height - padding }
                    ]);
                }
            }, [cropMode, activePage]);

            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                setIsProcessing(true);
                for (const file of files) {
                    if (file.type === 'application/pdf') {
                        if (!window.pdfjsLib) { alert("Loading PDF engine..."); setIsProcessing(false); return; }
                        try {
                            const arrayBuffer = await file.arrayBuffer();
                            const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const viewport = page.getViewport({ scale: 2.0 });
                                const offscreenCanvas = document.createElement('canvas');
                                offscreenCanvas.width = viewport.width; offscreenCanvas.height = viewport.height;
                                await page.render({ canvasContext: offscreenCanvas.getContext('2d'), viewport }).promise;
                                // Use PNG for lossless internal storage
                                const imgData = offscreenCanvas.toDataURL('image/png');
                                const newPage = { id: Date.now() + Math.random(), src: imgData, originalSrc: imgData, name: `${file.name}-${i}`, width: viewport.width, height: viewport.height };
                                setPages(prev => [...prev, newPage]);
                                if (i === 1 && !activePageId) setActivePageId(newPage.id);
                            }
                        } catch (err) { alert("PDF Error: " + err.message); }
                    } else if (file.type.startsWith('image/')) {
                        await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                const img = new Image();
                                img.onload = () => {
                                    // Convert to PNG for lossless internal storage
                                    const tempCanvas = document.createElement('canvas');
                                    tempCanvas.width = img.width;
                                    tempCanvas.height = img.height;
                                    const ctx = tempCanvas.getContext('2d');
                                    ctx.drawImage(img, 0, 0);
                                    const pngData = tempCanvas.toDataURL('image/png');
                                    const newPage = { id: Date.now() + Math.random(), src: pngData, originalSrc: pngData, name: file.name, width: img.width, height: img.height };
                                    setPages(prev => [...prev, newPage]);
                                    if (!activePageId) setActivePageId(newPage.id);
                                    resolve();
                                };
                                img.src = ev.target.result;
                            };
                            reader.readAsDataURL(file);
                        });
                    }
                }
                setIsProcessing(false);
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            useEffect(() => {
                if (!activePage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    canvas.width = activePage.width; canvas.height = activePage.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = activePage.src;
            }, [activePage?.src]);

            const applyFilter = () => {
                if (!activePage) return;
                setIsProcessing(true);
                setTimeout(() => {
                    const canvas = canvasRef.current;
                    applyDocumentEnhancement(canvas.getContext('2d'), canvas.width, canvas.height, enhanceMode);
                    // Use PNG for lossless internal storage
                    const newSrc = canvas.toDataURL('image/png');
                    setPages(prev => prev.map(p => p.id === activePageId ? { ...p, src: newSrc } : p));
                    setIsProcessing(false);
                }, 50);
            };

            const resetImage = () => {
                if (!activePage) return;
                setPages(prev => prev.map(p => p.id === activePageId ? { ...p, src: p.originalSrc } : p));
                setCropPoints(null);
                setCropMode(false);
                setPaintHistory([]);
            };

            const rotateActivePage = () => {
                if (!activePage) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    canvas.width = activePage.height;
                    canvas.height = activePage.width;
                    ctx.translate(canvas.width/2, canvas.height/2);
                    ctx.rotate(90 * Math.PI / 180);
                    ctx.drawImage(img, -activePage.width/2, -activePage.height/2);
                    // Use PNG for lossless internal storage
                    const newSrc = canvas.toDataURL('image/png');
                    setPages(prev => prev.map(p => p.id === activePageId ? { ...p, src: newSrc, width: canvas.width, height: canvas.height } : p));
                };
                img.src = activePage.src;
            };

            // Crop point dragging (constrained within bounds)
            const handleCropPointMouseDown = (index, e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDraggingPoint(index);
            };

            const handleViewerMouseMove = (e) => {
                if (isDraggingPoint === null || !cropPoints || !viewerRef.current) return;
                const rect = viewerRef.current.getBoundingClientRect();
                // Constrain to document bounds
                const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const y = Math.max(0, Math.min(e.clientY - rect.top, rect.height));
                setCropPoints(prev => {
                    const newPoints = [...prev];
                    newPoints[isDraggingPoint] = { x, y };
                    return newPoints;
                });
            };

            const handleViewerMouseUp = () => {
                if (isDraggingPoint !== null) setIsDraggingPoint(null);
                if (isPainting) {
                    setIsPainting(false);
                    // Use PNG for lossless internal storage
                    const newSrc = canvasRef.current.toDataURL('image/png');
                    setPages(prev => prev.map(p => p.id === activePageId ? { ...p, src: newSrc } : p));
                }
            };

            const executePerspectiveCrop = () => {
                if (!cropPoints || !canvasRef.current || !activePage || !viewerRef.current) return;
                setIsProcessing(true);
                setTimeout(() => {
                    const canvas = canvasRef.current;
                    const rect = viewerRef.current.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const scaledPoints = cropPoints.map(p => ({ x: p.x * scaleX, y: p.y * scaleY }));
                    
                    const width1 = Math.sqrt(Math.pow(scaledPoints[1].x - scaledPoints[0].x, 2) + Math.pow(scaledPoints[1].y - scaledPoints[0].y, 2));
                    const width2 = Math.sqrt(Math.pow(scaledPoints[2].x - scaledPoints[3].x, 2) + Math.pow(scaledPoints[2].y - scaledPoints[3].y, 2));
                    const height1 = Math.sqrt(Math.pow(scaledPoints[3].x - scaledPoints[0].x, 2) + Math.pow(scaledPoints[3].y - scaledPoints[0].y, 2));
                    const height2 = Math.sqrt(Math.pow(scaledPoints[2].x - scaledPoints[1].x, 2) + Math.pow(scaledPoints[2].y - scaledPoints[1].y, 2));
                    const outputWidth = Math.round(Math.max(width1, width2));
                    const outputHeight = Math.round(Math.max(height1, height2));
                    
                    try {
                        const resultCanvas = applyPerspectiveTransform(canvas, scaledPoints, outputWidth, outputHeight);
                        // Use PNG for lossless internal storage
                        const newSrc = resultCanvas.toDataURL('image/png');
                        setPages(prev => prev.map(p => p.id === activePageId ? { ...p, src: newSrc, width: outputWidth, height: outputHeight } : p));
                        setCropPoints(null);
                        setCropMode(false);
                    } catch (err) { alert("Crop failed: " + err.message); }
                    setIsProcessing(false);
                }, 50);
            };

            // Paint handlers
            const handlePaintMouseDown = (e) => {
                if (!activePage || activeTool !== 'paint' || cropMode) return;
                
                // Save current canvas state before painting
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                setPaintHistory(prev => [...prev.slice(-19), imageData]); // Keep last 20 states
                
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const canvasX = (e.clientX - rect.left) * scaleX;
                const canvasY = (e.clientY - rect.top) * scaleY;
                
                ctx.beginPath();
                ctx.moveTo(canvasX, canvasY);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = brushColor;
                ctx.lineWidth = brushSize * scaleX;
                setIsPainting(true);
            };

            const undoLastStroke = () => {
                if (paintHistory.length === 0 || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const lastState = paintHistory[paintHistory.length - 1];
                ctx.putImageData(lastState, 0, 0);
                setPaintHistory(prev => prev.slice(0, -1));
                // Save the restored state
                const newSrc = canvas.toDataURL('image/png');
                setPages(prev => prev.map(p => p.id === activePageId ? { ...p, src: newSrc } : p));
            };

            const clearAllPaint = () => {
                if (!activePage || !canvasRef.current) return;
                // Reset to original and clear history
                setPages(prev => prev.map(p => p.id === activePageId ? { ...p, src: p.originalSrc } : p));
                setPaintHistory([]);
            };

            const handlePaintMouseMove = (e) => {
                // Update brush cursor position when in paint mode
                if (activeTool === 'paint' && !cropMode && viewerRef.current) {
                    const rect = viewerRef.current.getBoundingClientRect();
                    setBrushCursor({
                        x: e.clientX - rect.left,
                        y: e.clientY - rect.top,
                        visible: true
                    });
                }
                
                if (!isPainting || !activePage) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                const canvasX = (e.clientX - rect.left) * scaleX;
                const canvasY = (e.clientY - rect.top) * scaleY;
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(canvasX, canvasY);
                ctx.stroke();
            };

            const handleViewerMouseEnter = () => {
                if (activeTool === 'paint' && !cropMode) {
                    setBrushCursor(prev => ({ ...prev, visible: true }));
                }
            };

            const handleViewerMouseLeave = () => {
                setBrushCursor(prev => ({ ...prev, visible: false }));
            };

            const exportFile = (type) => {
                if (!activePage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                if (type === 'jpg') {
                    const link = document.createElement('a');
                    link.download = `doc-${activePage.name}.jpg`;
                    // Use maximum quality for export
                    link.href = canvas.toDataURL('image/jpeg', 1.0);
                    link.click();
                } else if (type === 'png') {
                    const link = document.createElement('a');
                    link.download = `doc-${activePage.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } else {
                    const { jsPDF } = window.jspdf;
                    if (!jsPDF) return alert("PDF Engine not loaded");
                    const orient = canvas.width > canvas.height ? 'l' : 'p';
                    const doc = new jsPDF({ orientation: orient, unit: 'px', format: [canvas.width, canvas.height] });
                    // Use PNG for highest quality in PDF
                    doc.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
                    doc.save(`doc-${activePage.name}.pdf`);
                }
            };

            const renderCropOverlay = () => {
                if (!cropMode || !cropPoints) return null;
                const pathData = `M ${cropPoints[0].x} ${cropPoints[0].y} L ${cropPoints[1].x} ${cropPoints[1].y} L ${cropPoints[2].x} ${cropPoints[2].y} L ${cropPoints[3].x} ${cropPoints[3].y} Z`;
                
                return (
                    <div className="absolute inset-0 z-20" onMouseMove={handleViewerMouseMove} onMouseUp={handleViewerMouseUp} onMouseLeave={handleViewerMouseUp}>
                        <svg className="absolute inset-0 w-full h-full pointer-events-none">
                            <defs>
                                <mask id="cropMask">
                                    <rect width="100%" height="100%" fill="white" />
                                    <path d={pathData} fill="black" />
                                </mask>
                            </defs>
                            <rect width="100%" height="100%" fill="rgba(0,0,0,0.4)" mask="url(#cropMask)" />
                            <path d={pathData} fill="none" stroke="hsl(240, 5.9%, 10%)" strokeWidth="2" />
                            <line x1={(cropPoints[0].x + cropPoints[1].x) / 2} y1={(cropPoints[0].y + cropPoints[1].y) / 2}
                                  x2={(cropPoints[3].x + cropPoints[2].x) / 2} y2={(cropPoints[3].y + cropPoints[2].y) / 2}
                                  stroke="hsl(240, 5.9%, 10%)" strokeWidth="1" strokeDasharray="4,4" opacity="0.5" />
                            <line x1={(cropPoints[0].x + cropPoints[3].x) / 2} y1={(cropPoints[0].y + cropPoints[3].y) / 2}
                                  x2={(cropPoints[1].x + cropPoints[2].x) / 2} y2={(cropPoints[1].y + cropPoints[2].y) / 2}
                                  stroke="hsl(240, 5.9%, 10%)" strokeWidth="1" strokeDasharray="4,4" opacity="0.5" />
                        </svg>
                        {cropPoints.map((point, index) => (
                            <div key={index} className="crop-handle" style={{ left: point.x, top: point.y }} onMouseDown={(e) => handleCropPointMouseDown(index, e)} />
                        ))}
                    </div>
                );
            };

            // Calculate displayed dimensions
            const displayWidth = activePage ? activePage.width * (zoom / 100) : 0;
            const displayHeight = activePage ? activePage.height * (zoom / 100) : 0;

            return (
                <div className="flex flex-col h-screen w-full bg-background font-sans">
                    
                    <header className="h-14 border-b flex items-center justify-between px-6 bg-background/80 backdrop-blur-sm z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
                                <ScanLine className="w-5 h-5 text-primary-foreground" />
                            </div>
                            <span className="font-semibold text-lg tracking-tight">simple</span>
                        </div>
                        <div className="flex items-center gap-2">
                             <Button variant="outline" size="sm" onClick={() => fileInputRef.current.click()}>
                                <Plus className="w-4 h-4 mr-2" /> Add Pages
                             </Button>
                             <div className="flex items-center border rounded-md ml-2">
                                <Button variant="ghost" size="icon" className="h-8 w-8 rounded-none" onClick={() => setZoom(z => Math.max(10, z - 10))}><ZoomOut className="w-3 h-3" /></Button>
                                <span className="w-12 text-center text-xs font-medium">{zoom}%</span>
                                <Button variant="ghost" size="icon" className="h-8 w-8 rounded-none" onClick={() => setZoom(z => Math.min(300, z + 10))}><ZoomIn className="w-3 h-3" /></Button>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        
                        <div className="w-64 border-r bg-muted/10 flex flex-col">
                            <div className="p-4 border-b flex items-center justify-between">
                                <span className="text-xs font-semibold text-muted-foreground uppercase tracking-wider">Documents</span>
                                <span className="text-xs text-muted-foreground">{pages.length} Pages</span>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {pages.map((page, idx) => (
                                    <div key={page.id} onClick={() => { setActivePageId(page.id); setCropMode(false); setCropPoints(null); setPaintHistory([]); }}
                                         className={cn("group relative aspect-[3/4] border-2 rounded-lg overflow-hidden cursor-pointer transition-all hover:border-primary/50", activePageId === page.id ? "border-primary ring-2 ring-primary/10" : "border-border bg-white")}>
                                        <img src={page.src} className="w-full h-full object-cover" />
                                        <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Button variant="destructive" size="icon" className="h-6 w-6" onClick={(e) => { e.stopPropagation(); const np = pages.filter(p => p.id !== page.id); setPages(np); if(activePageId === page.id) setActivePageId(np[0]?.id || null); }}>
                                                <Trash2 className="w-3 h-3" />
                                            </Button>
                                        </div>
                                        <div className="absolute bottom-0 inset-x-0 bg-background/90 border-t p-1 text-center text-[10px] font-medium text-muted-foreground truncate px-2">{idx + 1}. {page.name}</div>
                                    </div>
                                ))}
                                {pages.length === 0 && (
                                    <div className="text-center p-8 border-2 border-dashed rounded-lg border-muted-foreground/25">
                                        <p className="text-sm text-muted-foreground">No pages</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Fixed scrolling container */}
                        <div ref={containerRef} className="flex-1 bg-muted/10 bg-dot-pattern overflow-hidden relative">
                            <div ref={scrollContainerRef} className="scroll-container">
                                <div 
                                    className="scroll-content"
                                    style={{
                                        width: activePage ? Math.max('100%', displayWidth + 64) : '100%',
                                        height: activePage ? Math.max('100%', displayHeight + 64) : '100%',
                                        minWidth: activePage && displayWidth > (containerRef.current?.clientWidth || 0) - 64 ? displayWidth + 64 : '100%',
                                        minHeight: activePage && displayHeight > (containerRef.current?.clientHeight || 0) - 64 ? displayHeight + 64 : '100%',
                                    }}
                                >
                                    {activePage ? (
                                        <div ref={viewerRef}
                                             className="relative shadow-xl bg-white flex-shrink-0" 
                                             style={{ width: displayWidth, height: displayHeight }}
                                             onMouseDown={handlePaintMouseDown} 
                                             onMouseMove={(e) => { handleViewerMouseMove(e); handlePaintMouseMove(e); }} 
                                             onMouseUp={handleViewerMouseUp} 
                                             onMouseLeave={(e) => { handleViewerMouseUp(); handleViewerMouseLeave(); }}
                                             onMouseEnter={handleViewerMouseEnter}>
                                            
                                            <canvas ref={canvasRef} className={cn("w-full h-full block", cropMode ? "cursor-default" : activeTool === 'paint' ? "cursor-none" : "cursor-default")} />
                                            
                                            {/* Brush cursor overlay */}
                                            {activeTool === 'paint' && !cropMode && brushCursor.visible && (
                                                <div 
                                                    className="pointer-events-none absolute rounded-full border-2 transition-[width,height] duration-75"
                                                    style={{
                                                        width: brushSize * (zoom / 100),
                                                        height: brushSize * (zoom / 100),
                                                        left: brushCursor.x,
                                                        top: brushCursor.y,
                                                        transform: 'translate(-50%, -50%)',
                                                        borderColor: brushColor === '#ffffff' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.7)',
                                                        backgroundColor: brushColor === '#ffffff' 
                                                            ? 'rgba(255,255,255,0.3)' 
                                                            : `${brushColor}33`,
                                                        boxShadow: brushColor === '#ffffff' 
                                                            ? '0 0 0 1px rgba(0,0,0,0.2)' 
                                                            : '0 0 0 1px rgba(255,255,255,0.3)',
                                                    }}
                                                />
                                            )}
                                            
                                            {isProcessing && (
                                                <div className="absolute inset-0 bg-white/50 backdrop-blur-[2px] flex items-center justify-center z-30">
                                                    <div className="bg-white px-6 py-3 rounded-full shadow-lg border flex items-center gap-3">
                                                        <div className="w-4 h-4 border-2 border-primary border-t-transparent rounded-full animate-spin" />
                                                        <span className="text-sm font-medium">Processing...</span>
                                                    </div>
                                                </div>
                                            )}

                                            {renderCropOverlay()}
                                        </div>
                                    ) : (
                                        <div className="text-center">
                                            <div className="w-16 h-16 bg-muted rounded-2xl flex items-center justify-center mx-auto mb-4">
                                                <ImageIcon className="w-8 h-8 text-muted-foreground" />
                                            </div>
                                            <h3 className="text-lg font-semibold">No Document Selected</h3>
                                            <p className="text-sm text-muted-foreground mt-1 max-w-xs mx-auto">Upload a PDF or Image to start editing, enhancing, and exporting.</p>
                                            <Button className="mt-4" onClick={() => fileInputRef.current.click()}>Upload File</Button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className={cn("bg-background border-l flex flex-col transition-all duration-300", rightPanelOpen ? "w-80" : "w-14")}>
                            <div className="h-12 border-b flex items-center px-2 justify-between">
                                {rightPanelOpen && <span className="font-semibold text-sm px-2">Tools</span>}
                                <Button variant="ghost" size="icon" onClick={() => setRightPanelOpen(!rightPanelOpen)}>
                                    {rightPanelOpen ? <ChevronRight className="w-4 h-4" /> : <ChevronLeft className="w-4 h-4" />}
                                </Button>
                            </div>

                            <div className="flex-1 overflow-y-auto">
                                <div className={cn("grid gap-1 p-2", rightPanelOpen ? "grid-cols-4" : "grid-cols-1")}>
                                    {['enhance', 'edit', 'paint', 'export'].map(t => (
                                        <button key={t} onClick={() => { setActiveTool(t); if (t !== 'edit') { setCropMode(false); setCropPoints(null); } if (!rightPanelOpen) setRightPanelOpen(true); }}
                                                className={cn("flex flex-col items-center justify-center gap-1 rounded-md py-2 px-1 text-[10px] font-medium transition-colors uppercase", 
                                                activeTool === t ? "bg-secondary text-secondary-foreground" : "text-muted-foreground hover:bg-muted hover:text-foreground")}>
                                            {t === 'enhance' && <Sparkles className="w-4 h-4" />}
                                            {t === 'edit' && <Crop className="w-4 h-4" />}
                                            {t === 'paint' && <Paintbrush className="w-4 h-4" />}
                                            {t === 'export' && <Download className="w-4 h-4" />}
                                            {rightPanelOpen && <span>{t}</span>}
                                        </button>
                                    ))}
                                </div>
                                <Separator />
                                
                                {rightPanelOpen && activePage && (
                                    <div className="p-4 space-y-6">
                                        
                                        {activeTool === 'enhance' && (
                                            <div className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Document Enhancement</h3>
                                                    <p className="text-xs text-muted-foreground">Transform photos into clean scanned documents.</p>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {[
                                                        { id: 'auto', label: 'Auto', desc: 'Balanced' },
                                                        { id: 'scan', label: 'Scan', desc: 'Clean B&W' },
                                                        { id: 'lighten', label: 'Lighten', desc: 'Remove shadows' },
                                                        { id: 'sharpen', label: 'Sharpen', desc: 'Increase clarity' }
                                                    ].map(mode => (
                                                        <button key={mode.id} onClick={() => setEnhanceMode(mode.id)}
                                                            className={cn("p-2 rounded-md border text-left transition-all", 
                                                            enhanceMode === mode.id ? "border-primary bg-primary/5" : "border-border hover:border-primary/50")}>
                                                            <div className="text-xs font-medium">{mode.label}</div>
                                                            <div className="text-[10px] text-muted-foreground">{mode.desc}</div>
                                                        </button>
                                                    ))}
                                                </div>
                                                <Button className="w-full" onClick={applyFilter}><Wand2 className="w-4 h-4 mr-2" /> Apply Enhancement</Button>
                                                <Button variant="outline" className="w-full" onClick={resetImage}><RefreshCw className="w-4 h-4 mr-2" /> Reset to Original</Button>
                                                <Separator />
                                                <Button variant="secondary" className="w-full" onClick={rotateActivePage}><RotateCw className="w-4 h-4 mr-2" /> Rotate 90°</Button>
                                            </div>
                                        )}

                                        {activeTool === 'edit' && (
                                            <div className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Perspective Crop</h3>
                                                    <p className="text-xs text-muted-foreground">Drag the 4 corners to select your document. Corrects perspective automatically.</p>
                                                </div>
                                                {!cropMode ? (
                                                    <Button className="w-full" onClick={() => setCropMode(true)}><Crop className="w-4 h-4 mr-2" /> Start Crop</Button>
                                                ) : (
                                                    <div className="space-y-2">
                                                        <div className="bg-muted/50 p-3 rounded-md border text-xs text-center text-muted-foreground">
                                                            Drag corner handles to adjust
                                                        </div>
                                                        <Button className="w-full" onClick={executePerspectiveCrop}><Check className="w-4 h-4 mr-2" /> Apply Crop</Button>
                                                        <Button variant="ghost" className="w-full text-destructive hover:text-destructive" onClick={() => { setCropMode(false); setCropPoints(null); }}>Cancel</Button>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {activeTool === 'paint' && (
                                            <div className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Correction Tool</h3>
                                                    <p className="text-xs text-muted-foreground">Use white to erase marks, black to fill text.</p>
                                                </div>
                                                
                                                <div>
                                                    <label className="text-xs font-medium mb-2 block">Shade</label>
                                                    <div className="grid grid-cols-6 gap-1.5">
                                                        {paintColors.map(c => (
                                                            <button key={c} onClick={() => setBrushColor(c)} 
                                                                className={cn("w-8 h-8 rounded border transition-all", brushColor === c ? "ring-2 ring-primary ring-offset-1 scale-110" : "border-border hover:scale-105")} 
                                                                style={{ backgroundColor: c }} />
                                                        ))}
                                                    </div>
                                                </div>
                                                <div>
                                                    <label className="text-xs font-medium mb-2 block">Brush Size: {brushSize}px</label>
                                                    <input type="range" min="1" max="50" value={brushSize} onChange={(e) => setBrushSize(parseInt(e.target.value))} className="w-full accent-primary" />
                                                </div>
                                                
                                                <Separator />
                                                
                                                {/* Undo and Clear Buttons */}
                                                <div className="space-y-2">
                                                    <Button 
                                                        variant="outline" 
                                                        className="w-full" 
                                                        onClick={undoLastStroke}
                                                        disabled={paintHistory.length === 0}
                                                    >
                                                        <Undo2 className="w-4 h-4 mr-2" /> 
                                                        Undo Stroke
                                                        {paintHistory.length > 0 && (
                                                            <span className="ml-auto text-xs text-muted-foreground">({paintHistory.length})</span>
                                                        )}
                                                    </Button>
                                                    <Button 
                                                        variant="ghost" 
                                                        className="w-full text-destructive hover:text-destructive hover:bg-destructive/10" 
                                                        onClick={clearAllPaint}
                                                    >
                                                        <Eraser className="w-4 h-4 mr-2" /> Clear All Paint
                                                    </Button>
                                                </div>
                                            </div>
                                        )}

                                        {activeTool === 'export' && (
                                            <div className="space-y-4 animate-in fade-in slide-in-from-right-4 duration-300">
                                                <div>
                                                    <h3 className="font-medium text-sm mb-1">Export Page</h3>
                                                    <p className="text-xs text-muted-foreground">Save current page to device.</p>
                                                </div>
                                                <div className="grid grid-cols-3 gap-3">
                                                    <button onClick={() => exportFile('pdf')} className="flex flex-col items-center justify-center p-4 rounded-lg border bg-card hover:bg-accent hover:text-accent-foreground transition-colors text-center gap-2">
                                                        <FileText className="w-6 h-6 text-red-500" />
                                                        <span className="text-xs font-medium">PDF</span>
                                                    </button>
                                                    <button onClick={() => exportFile('png')} className="flex flex-col items-center justify-center p-4 rounded-lg border bg-card hover:bg-accent hover:text-accent-foreground transition-colors text-center gap-2">
                                                        <ImageIcon className="w-6 h-6 text-green-500" />
                                                        <span className="text-xs font-medium">PNG</span>
                                                    </button>
                                                    <button onClick={() => exportFile('jpg')} className="flex flex-col items-center justify-center p-4 rounded-lg border bg-card hover:bg-accent hover:text-accent-foreground transition-colors text-center gap-2">
                                                        <ImageIcon className="w-6 h-6 text-blue-500" />
                                                        <span className="text-xs font-medium">JPG</span>
                                                    </button>
                                                </div>
                                                <p className="text-[10px] text-muted-foreground text-center">PNG for best quality, JPG for smaller size</p>
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                {rightPanelOpen && !activePage && (
                                    <div className="p-8 text-center text-xs text-muted-foreground">Select a page to view tools.</div>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" multiple accept="image/*,application/pdf" />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DocuScanPro />);
    </script>
</body>
</html>
