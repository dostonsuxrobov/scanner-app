<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuScan Pro</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF for PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Main Application Logic -->
    <script type="text/babel" data-type="module">
        // Import Dependencies from ESM.sh (CDN)
        import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { clsx } from 'https://esm.sh/clsx';
        import { twMerge } from 'https://esm.sh/tailwind-merge';
        import { 
          Menu, Search, MousePointer2, Hand, ZoomIn, ZoomOut, Save, 
          Image as ImageIcon, Wand2, ScanLine, Download, Trash2, 
          ChevronRight, ChevronLeft, Settings, MoreVertical, X, 
          FileText, Layers, Crop, Sun, Contrast, RotateCw, FileType, Check,
          Paintbrush, Palette
        } from 'https://esm.sh/lucide-react@0.294.0?deps=react@18.2.0';

        // --- Utility Components ---
        const cn = (...inputs) => twMerge(clsx(inputs));

        const Button = ({ children, variant = "default", size = "default", className, ...props }) => {
            const variants = {
                default: "bg-slate-900 text-white hover:bg-slate-800",
                outline: "border border-slate-200 bg-white hover:bg-slate-100 text-slate-900",
                ghost: "hover:bg-slate-100 text-slate-700",
                secondary: "bg-slate-100 text-slate-900 hover:bg-slate-200",
                destructive: "bg-red-500 text-white hover:bg-red-600",
            };
            const sizes = {
                default: "h-10 px-4 py-2",
                sm: "h-9 rounded-md px-3",
                icon: "h-10 w-10",
                lg: "h-11 rounded-md px-8"
            };
            return (
                <button 
                    className={cn(
                        "inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-slate-950 disabled:pointer-events-none disabled:opacity-50",
                        variants[variant], sizes[size], className
                    )}
                    {...props}
                >
                    {children}
                </button>
            );
        };

        const Separator = ({ className, orientation = "horizontal" }) => (
            <div className={cn(
                "bg-slate-200",
                orientation === "horizontal" ? "h-[1px] w-full" : "h-full w-[1px]",
                className
            )} />
        );

        // --- Image Processing Logic (OmniFix) ---
        const applyOmniFilter = (ctx, width, height, thresholdLevel = 100) => {
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                // High contrast curve
                gray = (gray - 128) * 1.5 + 128;
                
                // Smart Binarization
                if (gray > thresholdLevel) {
                    gray = 255; // Paper white
                } else {
                    gray = gray * 0.8; // Ink dark
                }

                data[i] = gray;
                data[i + 1] = gray;
                data[i + 2] = gray;
            }
            ctx.putImageData(imageData, 0, 0);
        };

        // --- Main Component ---
        function DocuScanPro() {
            const [pages, setPages] = useState([]);
            const [activePageId, setActivePageId] = useState(null);
            const [zoom, setZoom] = useState(60);
            const [isProcessing, setIsProcessing] = useState(false);
            const [processingMessage, setProcessingMessage] = useState("Processing...");
            const [rightPanelOpen, setRightPanelOpen] = useState(true);
            const [activeTool, setActiveTool] = useState("enhance");
            
            // Cropping State
            const [cropSelection, setCropSelection] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });

            // Painting State
            const [brushColor, setBrushColor] = useState("#ef4444"); // Default Red
            const [brushSize, setBrushSize] = useState(5);
            
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const fileInputRef = useRef(null);

            // Load PDF.js dynamically
            useEffect(() => {
                if (!window.pdfjsLib) {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                    script.async = true;
                    script.onload = () => {
                        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                        console.log("PDF.js loaded");
                    };
                    document.body.appendChild(script);
                }
            }, []);

            // Removed Initial Demo Image to fix "Tainted Canvas" error

            const activePage = pages.find(p => p.id === activePageId);

            // File Handling
            const handleFileUpload = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                
                setIsProcessing(true);
                setProcessingMessage("Importing...");

                for (const file of files) {
                    if (file.type === 'application/pdf') {
                        if (!window.pdfjsLib) {
                            alert("PDF Library loading. Try again shortly.");
                            setIsProcessing(false);
                            return;
                        }
                        try {
                            const arrayBuffer = await file.arrayBuffer();
                            const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                            
                            for (let i = 1; i <= pdf.numPages; i++) {
                                setProcessingMessage(`Importing Page ${i}/${pdf.numPages}...`);
                                const page = await pdf.getPage(i);
                                const viewport = page.getViewport({ scale: 2.0 });
                                
                                const offscreenCanvas = document.createElement('canvas');
                                offscreenCanvas.width = viewport.width;
                                offscreenCanvas.height = viewport.height;
                                const offscreenCtx = offscreenCanvas.getContext('2d');
                                
                                await page.render({ canvasContext: offscreenCtx, viewport }).promise;
                                const imgData = offscreenCanvas.toDataURL('image/jpeg', 0.85);
                                
                                const newPage = {
                                    id: Date.now() + Math.random(),
                                    src: imgData,
                                    originalSrc: imgData,
                                    name: `${file.name} - ${i}`,
                                    width: viewport.width,
                                    height: viewport.height,
                                    rotation: 0
                                };
                                setPages(prev => [...prev, newPage]);
                                if (i === 1 && !activePageId) setActivePageId(newPage.id);
                            }
                        } catch (err) {
                            console.error(err);
                            alert("PDF Load Error: " + err.message);
                        }
                    } else if (file.type.startsWith('image/')) {
                        await new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                const img = new Image();
                                img.onload = () => {
                                    const newPage = {
                                        id: Date.now() + Math.random(),
                                        src: event.target.result,
                                        originalSrc: event.target.result,
                                        name: file.name,
                                        width: img.width,
                                        height: img.height,
                                        rotation: 0
                                    };
                                    setPages(prev => [...prev, newPage]);
                                    if (!activePageId) setActivePageId(newPage.id);
                                    resolve();
                                };
                                img.src = event.target.result;
                            };
                            reader.readAsDataURL(file);
                        });
                    }
                }
                if (!activePageId && pages.length > 0) setActivePageId(pages[pages.length - 1].id);
                setIsProcessing(false);
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            // Canvas Renderer
            useEffect(() => {
                if (!activePage || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    canvas.width = activePage.width;
                    canvas.height = activePage.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = activePage.src;
            }, [activePage?.src, activePage?.width, activePage?.height]); 

            // Operations
            const applyFilter = () => {
                if (!activePage || !canvasRef.current) return;
                setIsProcessing(true);
                setProcessingMessage("Enhancing...");

                setTimeout(() => {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    applyOmniFilter(ctx, canvas.width, canvas.height, 130);
                    const newSrc = canvas.toDataURL('image/jpeg', 0.8);
                    
                    setPages(prev => prev.map(p => 
                        p.id === activePageId ? { ...p, src: newSrc } : p
                    ));
                    setIsProcessing(false);
                }, 50);
            };

            const resetImage = () => {
                if (!activePage) return;
                setPages(prev => prev.map(p => 
                    p.id === activePageId ? { ...p, src: p.originalSrc, rotation: 0 } : p
                ));
                setCropSelection(null);
            };

            // --- EXPORT LOGIC ---
            const exportJPG = () => {
                if(!activePage || !canvasRef.current) return;
                try {
                    const link = document.createElement('a');
                    link.download = `docuscan-${activePage.name || 'page'}.jpg`;
                    link.href = canvasRef.current.toDataURL('image/jpeg', 0.9);
                    link.click();
                } catch (e) {
                    console.error(e);
                    alert("Export failed: " + e.message);
                }
            };

            const exportPDF = () => {
                if(!activePage || !canvasRef.current) return;
                try {
                    const { jsPDF } = window.jspdf;
                    if(!jsPDF) { alert("PDF library not ready"); return; }
                    
                    const canvas = canvasRef.current;
                    // Determine orientation based on aspect ratio
                    const orientation = canvas.width > canvas.height ? 'l' : 'p';
                    const doc = new jsPDF({ orientation, unit: 'px', format: [canvas.width, canvas.height] });
                    
                    doc.addImage(canvas.toDataURL('image/jpeg', 0.9), 'JPEG', 0, 0, canvas.width, canvas.height);
                    doc.save(`docuscan-export.pdf`);
                } catch (e) {
                     console.error(e);
                     alert("Export failed: " + e.message);
                }
            };

            // --- INTERACTIONS (Crop + Paint) ---
            const handleMouseDown = (e) => {
                if (!activePage) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Scale mouse pos to internal canvas resolution
                const scaleX = canvasRef.current.width / rect.width;
                const scaleY = canvasRef.current.height / rect.height;
                const canvasX = x * scaleX;
                const canvasY = y * scaleY;

                setDragStart({ x, y }); // Screen coords for crop box
                setIsDragging(true);

                if (activeTool === 'edit') {
                    setCropSelection({ x, y, w: 0, h: 0 });
                } else if (activeTool === 'paint') {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.beginPath();
                    ctx.moveTo(canvasX, canvasY);
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = brushColor;
                    ctx.lineWidth = brushSize * scaleX; // Adjust brush size for zoom/resolution
                }
            };

            const handleMouseMove = (e) => {
                if (!isDragging || !activePage) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const currentX = e.clientX - rect.left;
                const currentY = e.clientY - rect.top;

                if (activeTool === 'edit') {
                    const w = currentX - dragStart.x;
                    const h = currentY - dragStart.y;
                    setCropSelection({
                        x: w > 0 ? dragStart.x : currentX,
                        y: h > 0 ? dragStart.y : currentY,
                        w: Math.abs(w),
                        h: Math.abs(h)
                    });
                } else if (activeTool === 'paint') {
                    // Paint Logic
                    const scaleX = canvasRef.current.width / rect.width;
                    const scaleY = canvasRef.current.height / rect.height;
                    const canvasX = currentX * scaleX;
                    const canvasY = currentY * scaleY;

                    const ctx = canvasRef.current.getContext('2d');
                    ctx.lineTo(canvasX, canvasY);
                    ctx.stroke();
                }
            };

            const handleMouseUp = () => { 
                if (!isDragging) return;
                setIsDragging(false);

                if (activeTool === 'paint') {
                    // Commit the paint to state so it persists on re-renders (like zooming)
                    const canvas = canvasRef.current;
                    const newSrc = canvas.toDataURL('image/jpeg', 0.9);
                    setPages(prev => prev.map(p => 
                        p.id === activePageId ? { ...p, src: newSrc } : p
                    ));
                }
            };

            const executeCrop = () => {
                if (!cropSelection || !canvasRef.current || !activePage) return;
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                const actualX = cropSelection.x * scaleX;
                const actualY = cropSelection.y * scaleY;
                const actualW = cropSelection.w * scaleX;
                const actualH = cropSelection.h * scaleY;

                if (actualW < 10 || actualH < 10) return; 

                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = actualW;
                tempCanvas.height = actualH;
                const tempCtx = tempCanvas.getContext('2d');

                tempCtx.drawImage(canvas, actualX, actualY, actualW, actualH, 0, 0, actualW, actualH);

                const newSrc = tempCanvas.toDataURL('image/jpeg', 0.9);
                
                setPages(prev => prev.map(p => 
                    p.id === activePageId ? { ...p, src: newSrc, width: actualW, height: actualH } : p
                ));
                setCropSelection(null);
            };

            const rotateActivePage = () => {
                if (!activePage) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    canvas.width = activePage.height;
                    canvas.height = activePage.width;
                    ctx.translate(canvas.width/2, canvas.height/2);
                    ctx.rotate(90 * Math.PI / 180);
                    ctx.drawImage(img, -activePage.width/2, -activePage.height/2);
                    
                    const newSrc = canvas.toDataURL();
                    setPages(prev => prev.map(p => 
                        p.id === activePageId ? { ...p, src: newSrc, width: canvas.width, height: canvas.height } : p
                    ));
                };
                img.src = activePage.src;
            };

            const deletePage = (id, e) => {
                e.stopPropagation();
                const newPages = pages.filter(p => p.id !== id);
                setPages(newPages);
                if (activePageId === id && newPages.length > 0) setActivePageId(newPages[0].id);
                else if (newPages.length === 0) setActivePageId(null);
            };

            return (
                <div className="flex flex-col h-screen w-full bg-slate-100 font-sans text-slate-900 overflow-hidden">
                    {/* Header */}
                    <header className="h-14 bg-[#2f2f2f] text-white flex items-center px-4 justify-between flex-shrink-0 z-50 shadow-md">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-2">
                                <div className="bg-red-600 p-1 rounded-sm">
                                    <FileText className="w-5 h-5 text-white" />
                                </div>
                                <span className="font-semibold text-lg tracking-tight">DocuScan Pro</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <Button variant="ghost" className="text-white hover:bg-white/10 h-8 px-3" onClick={() => fileInputRef.current.click()}>
                                <ImageIcon className="w-4 h-4 mr-2" />
                                Add Page / PDF
                            </Button>
                        </div>
                    </header>

                    {/* Toolbar */}
                    <div className="h-12 bg-white border-b border-slate-200 flex items-center px-4 justify-between flex-shrink-0">
                        <div className="flex items-center gap-2">
                            <Button variant="ghost" size="icon" className="text-slate-600"><Menu className="w-5 h-5" /></Button>
                            <Separator orientation="vertical" className="h-6 mx-2" />
                            <Button variant="ghost" size="icon" className="text-slate-600" onClick={exportJPG}><Save className="w-5 h-5" /></Button>
                            <Button variant="ghost" size="icon" className="text-slate-600" onClick={exportPDF}><Download className="w-5 h-5" /></Button>
                            <Separator orientation="vertical" className="h-6 mx-2" />
                            <div className="flex items-center bg-slate-100 rounded-md px-2 py-1 gap-2">
                                <Button variant="ghost" size="icon" className="h-6 w-6" onClick={() => setZoom(z => Math.max(10, z - 10))}><ZoomOut className="w-3 h-3" /></Button>
                                <span className="text-xs font-medium w-12 text-center">{zoom}%</span>
                                <Button variant="ghost" size="icon" className="h-6 w-6" onClick={() => setZoom(z => Math.min(200, z + 10))}><ZoomIn className="w-3 h-3" /></Button>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className={cn("p-1 rounded", (activeTool === 'edit' || activeTool === 'paint') ? "bg-slate-200" : "")}>
                                <MousePointer2 className="w-4 h-4 text-slate-600" />
                            </div>
                        </div>
                    </div>

                    {/* Main Workspace */}
                    <div className="flex-1 flex overflow-hidden">
                        {/* Sidebar */}
                        <div className="w-64 bg-slate-50 border-r border-slate-200 flex flex-col flex-shrink-0">
                            <div className="p-3 flex items-center justify-between border-b border-slate-200/50">
                                <span className="text-xs font-bold text-slate-500 uppercase tracking-wider">Pages</span>
                                <Layers className="w-4 h-4 text-slate-500" />
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {pages.map((page, idx) => (
                                    <div 
                                        key={page.id} onClick={() => setActivePageId(page.id)}
                                        className={cn("group relative aspect-[3/4] bg-white shadow-sm border-2 transition-all cursor-pointer rounded-sm overflow-hidden", activePageId === page.id ? "border-blue-500 ring-2 ring-blue-500/20" : "border-transparent hover:border-slate-300")}
                                    >
                                        <img src={page.src} className="w-full h-full object-cover opacity-90 group-hover:opacity-100" />
                                        <div className="absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button onClick={(e) => deletePage(page.id, e)} className="bg-red-500 text-white p-1 rounded hover:bg-red-600"><Trash2 className="w-3 h-3" /></button>
                                        </div>
                                        <div className="absolute bottom-0 left-0 bg-slate-900/50 text-white text-[10px] px-2 py-0.5 backdrop-blur-sm rounded-tr">{idx + 1}</div>
                                    </div>
                                ))}
                                <div onClick={() => fileInputRef.current.click()} className="aspect-[3/4] border-2 border-dashed border-slate-300 rounded-sm flex flex-col items-center justify-center cursor-pointer hover:bg-slate-200/50 transition-colors text-slate-400 hover:text-slate-600">
                                    <ImageIcon className="w-8 h-8 mb-2" />
                                    <span className="text-xs font-medium">Add PDF / IMG</span>
                                </div>
                            </div>
                            <input type="file" ref={fileInputRef} onChange={handleFileUpload} className="hidden" multiple accept="image/*,application/pdf" />
                        </div>

                        {/* Viewer */}
                        <div ref={containerRef} className="flex-1 bg-slate-200/50 overflow-auto flex justify-center p-8">
                            {activePage ? (
                                <div 
                                    style={{ 
                                        width: `${activePage.width * (zoom / 100)}px`,
                                        height: `${activePage.height * (zoom / 100)}px`,
                                        transition: 'width 0.2s ease-out, height 0.2s ease-out' 
                                    }}
                                    className="relative shadow-xl flex-shrink-0"
                                    onMouseDown={handleMouseDown}
                                    onMouseMove={handleMouseMove}
                                    onMouseUp={handleMouseUp}
                                    onMouseLeave={handleMouseUp}
                                >
                                    <canvas ref={canvasRef} 
                                        className={cn(
                                            "w-full h-full block bg-white", 
                                            activeTool === 'edit' ? "cursor-crosshair" : "",
                                            activeTool === 'paint' ? "cursor-cell" : "cursor-default"
                                        )} 
                                    />
                                    
                                    {isProcessing && (
                                        <div className="absolute inset-0 bg-white/60 backdrop-blur-sm flex items-center justify-center z-20">
                                            <div className="flex flex-col items-center animate-pulse">
                                                <ScanLine className="w-12 h-12 text-blue-600 mb-2" />
                                                <span className="font-semibold text-blue-800">{processingMessage}</span>
                                            </div>
                                        </div>
                                    )}

                                    {activeTool === 'edit' && cropSelection && (
                                        <div 
                                            className="absolute border-2 border-blue-500 bg-blue-500/10 z-10 pointer-events-none"
                                            style={{ left: cropSelection.x, top: cropSelection.y, width: cropSelection.w, height: cropSelection.h }}
                                        >
                                            <div className="absolute -top-6 left-0 bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded">
                                                Selection ({Math.round(cropSelection.w)} x {Math.round(cropSelection.h)})
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="flex flex-col items-center justify-center h-full text-slate-400">
                                    <div className="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-4"><FileType className="w-10 h-10 text-slate-300" /></div>
                                    <p className="text-lg font-medium text-slate-500">No document loaded</p>
                                </div>
                            )}
                        </div>

                        {/* Tools */}
                        <div className={cn("bg-white border-l border-slate-200 flex flex-col transition-all duration-300 ease-in-out shadow-lg z-20", rightPanelOpen ? "w-80" : "w-12")}>
                            <button onClick={() => setRightPanelOpen(!rightPanelOpen)} className="h-8 w-full border-b border-slate-100 flex items-center justify-center hover:bg-slate-50 text-slate-400">
                                {rightPanelOpen ? <ChevronRight className="w-4 h-4" /> : <ChevronLeft className="w-4 h-4" />}
                            </button>

                            {rightPanelOpen ? (
                                <div className="flex flex-col h-full">
                                    <div className="p-4 border-b border-slate-100"><h2 className="font-semibold text-slate-800">Tools</h2></div>
                                    <div className="flex-1 overflow-y-auto">
                                        <div className="grid grid-cols-4 p-2 gap-1 bg-slate-50/50 border-b border-slate-100">
                                            {['enhance', 'edit', 'paint', 'export'].map(tool => (
                                                <button key={tool} onClick={() => { setActiveTool(tool); setCropSelection(null); }} className={cn("text-xs font-medium py-2 rounded-md capitalize transition-all", activeTool === tool ? "bg-white text-blue-600 shadow-sm border border-slate-200" : "text-slate-500 hover:text-slate-800")}>{tool}</button>
                                            ))}
                                        </div>

                                        <div className="p-4 space-y-6">
                                            {activeTool === 'enhance' && (
                                                <div className="space-y-6">
                                                    <div className="space-y-3">
                                                        <div className="flex items-center gap-2 mb-2">
                                                            <div className="bg-green-100 p-1.5 rounded text-green-700"><Wand2 className="w-4 h-4" /></div>
                                                            <h3 className="font-medium text-slate-800">OmniFix Magic</h3>
                                                        </div>
                                                        <p className="text-xs text-slate-500 leading-relaxed">One-click enhancement to remove shadows and increase readability.</p>
                                                        <Button onClick={applyFilter} className="w-full bg-green-600 hover:bg-green-700 shadow-sm border-0" disabled={!activePage}><ScanLine className="w-4 h-4 mr-2" /> Apply Auto-Enhance</Button>
                                                        <Button onClick={resetImage} variant="outline" className="w-full text-xs" disabled={!activePage}>Revert to Original</Button>
                                                    </div>
                                                    <Separator />
                                                    <div className="space-y-4">
                                                        <h3 className="font-medium text-slate-800 text-sm">Adjustment</h3>
                                                        <Button variant="secondary" className="w-full text-xs" onClick={rotateActivePage}><RotateCw className="w-3 h-3 mr-2" /> Rotate 90°</Button>
                                                    </div>
                                                </div>
                                            )}

                                            {activeTool === 'edit' && (
                                                <div className="space-y-4">
                                                    <div className="p-3 bg-yellow-50 border border-yellow-100 rounded-md">
                                                        <h4 className="text-yellow-800 font-medium text-sm flex items-center"><Crop className="w-4 h-4 mr-2" /> Crop Page</h4>
                                                        <p className="text-xs text-yellow-700 mt-1">Click and drag on the image to select the area you want to keep.</p>
                                                    </div>
                                                    {cropSelection ? (
                                                        <div className="animate-in fade-in zoom-in duration-200">
                                                            <Button className="w-full bg-slate-900 mb-2" onClick={executeCrop}><Check className="w-4 h-4 mr-2" /> Confirm Crop</Button>
                                                            <Button variant="ghost" className="w-full text-red-500 hover:text-red-600" onClick={() => setCropSelection(null)}>Cancel Selection</Button>
                                                        </div>
                                                    ) : (
                                                        <div className="text-center p-4 border-2 border-dashed border-slate-200 rounded text-slate-400 text-xs">No selection active</div>
                                                    )}
                                                </div>
                                            )}

                                            {activeTool === 'paint' && (
                                                <div className="space-y-4">
                                                    <div className="p-3 bg-blue-50 border border-blue-100 rounded-md">
                                                        <h4 className="text-blue-800 font-medium text-sm flex items-center"><Paintbrush className="w-4 h-4 mr-2" /> Paint Tool</h4>
                                                        <p className="text-xs text-blue-700 mt-1">Draw directly on the document.</p>
                                                    </div>
                                                    <div className="space-y-3">
                                                        <label className="text-xs font-medium text-slate-600">Color</label>
                                                        <div className="flex gap-2">
                                                            {['#ef4444', '#22c55e', '#3b82f6', '#000000', '#ffffff'].map(c => (
                                                                <button 
                                                                    key={c}
                                                                    onClick={() => setBrushColor(c)}
                                                                    className={cn("w-6 h-6 rounded-full border border-slate-200", brushColor === c ? "ring-2 ring-offset-1 ring-slate-900" : "")}
                                                                    style={{ backgroundColor: c }}
                                                                />
                                                            ))}
                                                        </div>
                                                        <label className="text-xs font-medium text-slate-600 block mt-2">Brush Size: {brushSize}px</label>
                                                        <input type="range" min="1" max="20" value={brushSize} onChange={(e) => setBrushSize(parseInt(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-900" />
                                                    </div>
                                                </div>
                                            )}

                                            {activeTool === 'export' && (
                                                <div className="space-y-4">
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div onClick={exportPDF} className="border rounded-md p-3 hover:bg-slate-50 cursor-pointer flex flex-col items-center gap-2 transition-colors"><FileText className="w-8 h-8 text-red-500" /><span className="text-xs font-medium">Download PDF</span></div>
                                                        <div onClick={exportJPG} className="border rounded-md p-3 hover:bg-slate-50 cursor-pointer flex flex-col items-center gap-2 transition-colors"><ImageIcon className="w-8 h-8 text-blue-500" /><span className="text-xs font-medium">Download JPG</span></div>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center py-4 gap-4">
                                    <Button variant="ghost" size="icon" onClick={() => { setRightPanelOpen(true); setActiveTool('enhance'); }}><Wand2 className="w-5 h-5 text-green-600" /></Button>
                                    <Button variant="ghost" size="icon" onClick={() => { setRightPanelOpen(true); setActiveTool('edit'); }}><Crop className="w-5 h-5 text-slate-500" /></Button>
                                    <Button variant="ghost" size="icon" onClick={() => { setRightPanelOpen(true); setActiveTool('paint'); }}><Paintbrush className="w-5 h-5 text-blue-500" /></Button>
                                    <Button variant="ghost" size="icon" onClick={() => { setRightPanelOpen(true); setActiveTool('export'); }}><Download className="w-5 h-5 text-slate-500" /></Button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<DocuScanPro />);
    </script>
</body>
</html>
